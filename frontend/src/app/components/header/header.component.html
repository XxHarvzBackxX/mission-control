<header class="app-header" (click)="$event.stopPropagation()">
  <div class="header-brand">
    <img src="big_icon.png" alt="Mission Control" class="header-logo" />
    <span class="header-title">Mission Control</span>
  </div>

  <nav class="header-nav" aria-label="Primary navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Missions
    </a>
    <a routerLink="/rockets" routerLinkActive="active">
      Rockets
    </a>
  </nav>

  <div class="header-actions">
    <button
      class="burger-btn"
      type="button"
      aria-label="Open navigation menu"
      [attr.aria-expanded]="menuOpen"
      (click)="toggleMenu($event)"
    >
      <span class="burger-icon"></span>
      <span class="burger-icon"></span>
      <span class="burger-icon"></span>
    </button>

    @if (menuOpen) {
      <div class="burger-menu-panel" role="menu">
        <div class="burger-menu-card">
          <span class="burger-menu-coming-soon">Navigation coming soon</span>
        </div>
      </div>
    }
  </div>
</header>
